<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Комбиниран лист по писане | Дочка Кючукова</title>
    <style>
        @font-face {
            font-family: 'Boyan Maga';
            src: url('Boyan_Maga-Regular.ttf') format('truetype');
        }

        :root {
            --primary-blue: #0a192f;
            --accent-orange: #e65100;
            --line-faint: #e3f2fd; 
            --line-solid: #4facfe; 
            --pen-blue: #0047AB;   
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #e9ecef;
            display: flex;
        }

        .sidebar {
            width: 320px; background: white; height: 100vh;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); padding: 25px;
            box-sizing: border-box; overflow-y: auto; position: fixed;
            z-index: 100;
        }

        .sidebar h2 { color: var(--accent-orange); font-size: 1.4rem; margin-top: 0; text-transform: uppercase;}
        .control-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 0.9rem; }
        
        select, input[type="text"] {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 6px; font-size: 14px; box-sizing: border-box; font-family: inherit;
        }

        .align-control {
            background: #f0f8ff; padding: 15px; border-radius: 8px; border: 1px solid var(--line-solid); margin-bottom: 20px;
        }
        .align-control label { font-size: 0.9rem; color: var(--primary-blue); margin-bottom: 5px; display: block;}
        .align-control input[type="range"] { width: 100%; cursor: pointer; margin-bottom: 15px; }
        .align-control input[type="range"]:last-child { margin-bottom: 0; }

        .btn-generate, .btn-print {
            width: 100%; padding: 12px; color: white; border: none;
            border-radius: 6px; font-weight: bold; cursor: pointer;
            font-size: 16px; margin-top: 5px; transition: background 0.3s;
        }
        .btn-generate { background-color: var(--accent-orange); }
        .btn-generate:hover { background-color: #cc4800; }
        .btn-print { background-color: var(--primary-blue); }
        .btn-print:hover { background-color: #112240; }

        .workspace { margin-left: 320px; padding: 40px; flex-grow: 1; display: flex; justify-content: center; }
        
        .a4-sheet {
            width: 210mm; height: 297mm; background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 15mm;
            box-sizing: border-box; display: flex; flex-direction: column; position: relative;
            overflow: hidden;
        }

        .sheet-header { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .school-info { font-size: 14px; color: #333; }
        .student-info { font-size: 14px; display: flex; align-items: center; }
        .sheet-title { text-align: center; color: var(--primary-blue); margin-bottom: 20px; text-transform: uppercase; font-size: 20px;}

        /* ПЕРФЕКТНАТА МАТРИЦА С 12 РЕДА */
        .writing-zone {
            position: relative;
            height: 50px;
            margin-bottom: 12px; 
            width: 100%;
        }

        .g-line { position: absolute; left: 0; right: 0; z-index: 1; }
        .line-top { top: 0; border-top: 1px solid var(--line-faint); }
        .line-mid-top { top: 15px; border-top: 2px solid var(--line-solid); }
        .line-mid-bottom { top: 35px; border-top: 2px solid var(--line-solid); }
        .line-bottom { top: 50px; border-top: 1px solid var(--line-faint); }

        .cursive-output {
            position: absolute;
            left: 10px;
            font-family: 'Boyan Maga', cursive;
            z-index: 10;
            display: flex;
            gap: 25px;
            width: 100%;
            line-height: 1;
            white-space: nowrap;
        }

        .solid { color: var(--pen-blue); } 
        .trace { color: #b0bec5; opacity: 0.7;}

        .evaluation-footer { 
            margin-top: auto; text-align: center; padding-top: 10px; border-top: 1px dashed #eee;
        }
        .eval-text { font-size: 14px; color: #555; font-style: italic; margin-bottom: 5px; }
        .stars { font-size: 32px; color: #bdc3c7; letter-spacing: 5px; }

        @media print {
            @page { size: A4 portrait; margin: 0; }
            body { background: white; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .sidebar { display: none !important; }
            .workspace { margin: 0; padding: 0; }
            .a4-sheet { box-shadow: none; width: 210mm; height: 297mm; margin: 0; padding: 15mm; page-break-after: avoid; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Комбиниран лист</h2>
        
        <div class="control-group">
            <label>1. Основна буква:</label>
            <select id="letterSelect" onchange="generateSheet()">
            </select>
        </div>

        <div class="control-group">
            <label>2. Въведи 3 думи (със запетая):</label>
            <input type="text" id="wordsInput" value="мама, мак, море">
        </div>

        <div class="control-group">
            <label>3. Кратко изречение за препис:</label>
            <input type="text" id="sentenceInput" value="Мила мамо, обичам те!">
        </div>

        <div class="align-control">
            <label>📏 Размер на буквите:</label>
            <input type="range" min="30" max="80" value="48" id="size-slider" oninput="adjustSize(this.value)">
            
            <label>↕️ Нагласи нагоре/надолу:</label>
            <input type="range" min="-15" max="25" value="3" id="v-slider" oninput="adjustVertical(this.value)">
        </div>

        <div class="control-group">
            <label>Име на учителя:</label>
            <input type="text" id="teacherName" placeholder="Въведете име..." value="">
        </div>
        <div class="control-group">
            <label>Училище:</label>
            <input type="text" id="schoolName" placeholder="Въведете училище..." value="">
        </div>

        <button class="btn-generate" onclick="generateSheet()">🔄 Генерирай лист</button>
        <button class="btn-print" onclick="window.print()">🖨️ Отпечатай</button>
    </div>

    <div class="workspace">
        <div class="a4-sheet" id="printArea">
            <div class="sheet-header">
                <div class="school-info">
                    <strong id="displaySchool">_________________</strong><br>
                    Учител: <span id="displayTeacher">_________________</span>
                </div>
                <div class="student-info">
                    ✍️ Ученик: _______________________
                </div>
            </div>

            <h2 class="sheet-title">КОМПЛЕКСНО УПРАЖНЕНИЕ С БУКВА <span id="titleLetter">М</span></h2>

            <div id="writingLinesContainer">
                </div>

            <footer class="evaluation-footer">
                <div class="eval-text">Оцени се сам, като оцветиш звездичките:</div>
                <div class="stars">☆☆☆☆☆☆</div>
            </footer>
        </div>
    </div>

    <script>
        const consonants = ['Б', 'В', 'Г', 'Д', 'Ж', 'З', 'Й', 'К', 'Л', 'М', 'Н', 'П', 'Р', 'С', 'Т', 'Ф', 'Х', 'Ц', 'Ч', 'Ш', 'Щ'];
        const select = document.getElementById('letterSelect');
        consonants.forEach(letter => {
            let option = document.createElement('option');
            option.value = letter;
            option.textContent = letter;
            if(letter === 'М') option.selected = true;
            select.appendChild(option);
        });

        function createRow(contentHTML) {
            return `
                <div class="writing-zone">
                    <div class="g-line line-top"></div>
                    <div class="g-line line-mid-top"></div>
                    <div class="g-line line-mid-bottom"></div>
                    <div class="g-line line-bottom"></div>
                    <div class="cursive-output">${contentHTML}</div>
                </div>
            `;
        }

        function generateSheet() {
            // Зареждане на Име и Училище
            let tName = document.getElementById('teacherName').value;
            let sName = document.getElementById('schoolName').value;
            document.getElementById('displayTeacher').textContent = tName !== "" ? tName : "_________________";
            document.getElementById('displaySchool').textContent = sName !== "" ? sName : "_________________";

            const upper = document.getElementById('letterSelect').value;
            const lower = upper.toLowerCase();
            document.getElementById('titleLetter').textContent = upper;

            let wordsArray = document.getElementById('wordsInput').value.split(',').map(w => w.trim()).filter(w => w !== "");
            let w1 = wordsArray[0] || upper + lower; 
            let w2 = wordsArray[1] || w1;
            let w3 = wordsArray[2] || w1;

            let sentence = document.getElementById('sentenceInput').value;

            let container = document.getElementById('writingLinesContainer');
            let html = "";
            
            // --- БЛОК 1: БУКВИ (Редове 1 до 3) ---
            let row1 = `<span class="solid">${upper}</span><span class="solid">${upper}</span>` + `<span class="trace">${upper}</span>`.repeat(4);
            let row2 = `<span class="solid">${lower}</span><span class="solid">${lower}</span>` + `<span class="trace">${lower}</span>`.repeat(5);
            let row3 = `<span class="solid">${upper}${lower}</span><span class="solid">${upper}${lower}</span>` + `<span class="trace">${upper}${lower}</span>`.repeat(3);
            
            // --- БЛОК 2: СРИЧКИ (Редове 4 до 6) ---
            let row4 = `<span class="solid">${upper}а</span><span class="solid">${lower}а</span>` + `<span class="trace">${upper}а</span><span class="trace">${lower}а</span>`.repeat(2);
            let row5 = `<span class="solid">${upper}е</span><span class="solid">${lower}е</span>` + `<span class="trace">${upper}е</span><span class="trace">${lower}е</span>`.repeat(2);
            let row6 = `<span class="solid">${upper}и</span><span class="solid">${lower}и</span>` + `<span class="trace">${upper}и</span><span class="trace">${lower}и</span>`.repeat(2);

            // --- БЛОК 3: ДУМИ (Редове 7 до 9) ---
            let row7 = `<span class="solid">${w1}</span><span class="solid">${w1}</span>` + `<span class="trace">${w1}</span>`.repeat(2);
            let row8 = `<span class="solid">${w2}</span><span class="solid">${w2}</span>` + `<span class="trace">${w2}</span>`.repeat(2);
            let row9 = `<span class="solid">${w3}</span><span class="solid">${w3}</span>` + `<span class="trace">${w3}</span>`.repeat(2);

            // --- БЛОК 4: ИЗРЕЧЕНИЕ (Редове 10 до 12) ---
            let row10 = `<span class="solid">${sentence}</span>`; 
            let row11 = `<span class="trace">${sentence}</span>`; 
            let row12 = ``; 

            html += createRow(row1) + createRow(row2) + createRow(row3) + 
                    createRow(row4) + createRow(row5) + createRow(row6) + 
                    createRow(row7) + createRow(row8) + createRow(row9) + 
                    createRow(row10) + createRow(row11) + createRow(row12);
                    
            container.innerHTML = html;
            
            adjustSize(document.getElementById('size-slider').value);
            adjustVertical(document.getElementById('v-slider').value);
        }

        function adjustSize(val) {
            const outputs = document.querySelectorAll('.cursive-output');
            outputs.forEach(output => { output.style.fontSize = val + 'px'; });
        }

        function adjustVertical(val) {
            const outputs = document.querySelectorAll('.cursive-output');
            outputs.forEach(output => { output.style.top = val + 'px'; });
        }

        window.onload = generateSheet;
    </script>
</body>
</html>
